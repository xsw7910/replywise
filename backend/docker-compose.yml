services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      SERVICE_NAME: reply-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
