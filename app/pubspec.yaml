name: replywise
description: "ReplyWise — AI-powered reply and polish assistant."
publish_to: 'none'

version: 1.0.0+43

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP client
  dio: ^5.8.0

  # Secure storage & identity
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  purchases_flutter: ^10.3.0
  android_id: ^0.5.1
  crypto: ^3.0.7

  # UI / icons
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  google_mobile_ads: ^9.0.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  share_plus: ^12.0.2
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/reply.png
    - assets/icons/polish.png
    - assets/icons/explain.png
    - assets/icons/guidance.png
    - assets/icons/credites.png
    - assets/icons/recent.png
    - assets/icons/tip_of_the_day.png
    - assets/icons/premium.png
    - assets/image/hero_card.png
    - assets/image/reply_background.png
    - assets/image/polish_background.png
    - assets/image/explain_background.png
    - assets/image/guidance_background.png
    - assets/image/reply_page_backgroud.png
    - assets/image/polish_page_backgroud.png
    - assets/image/explain_page_backgroud.png
    - assets/image/guidance_page_backgroud.png
    - assets/image/premium_page_backgroud.png
    - assets/image/settings_background.webp
    - assets/icons/app_icon.png
    - assets/icons/app_icon_tight.png
    - assets/icons/out_of_credits_gift.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  # Legacy fallback: bubble on a white square (pre-Android 8 launchers).
  image_path: "assets/icons/launcher_legacy.png"
  # Adaptive icon (Android 8+): white background + bubble foreground sized to
  # the 66/108dp safe zone, so circular masks show a large bubble instead of
  # a shrunken legacy icon.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/launcher_foreground.png"
  min_sdk_android: 21
