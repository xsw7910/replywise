name: replywise
description: "ReplyWise — AI-powered reply and polish assistant."
publish_to: 'none'

version: 1.0.0+8

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP client
  dio: ^5.8.0

  # Secure storage & identity
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  purchases_flutter: ^10.3.0

  # UI / icons
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/reply.png
    - assets/icons/polish.png
    - assets/icons/explain.png
    - assets/icons/guidance.png
    - assets/image/hero_card.png
    - assets/image/reply_background.png
    - assets/image/polish_background.png
    - assets/image/explain_background.png
    - assets/image/guidance_background.png
    - assets/icons/app_icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
